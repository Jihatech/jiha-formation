name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      # `prebuild` synchronise le contenu depuis JIHA-Learn (réseau requis).
      # Aucune variable Supabase nécessaire au build (lecture paresseuse).
      - name: Build
        run: pnpm build
